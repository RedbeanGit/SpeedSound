name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  # ── Versioning + Build (main branch only) ─────────────────────────────────
  release:
    name: Version & Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write # needed to create tags and releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so tag action can compute next version

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      # Compute next semver tag from conventional commits (feat/fix/BREAKING CHANGE)
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # commits without prefix → patch bump
          tag_prefix: v

      # Inject versionName + versionCode into app/build.gradle before building
      - name: Set versionName and versionCode
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"   # e.g. "1.2.3"
          CODE="${{ github.run_number }}"
          sed -i "s/versionCode [0-9]*/versionCode $CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" app/build.gradle
          echo "Building version $VERSION (code $CODE)"

      # Decode keystore if secret is configured (optional — falls back to debug build)
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # Build signed release APK when keystore is present, debug APK otherwise
      - name: Build APK
        run: |
          if [ -f keystore.jks ]; then
            echo "Building signed release APK"
            ./gradlew assembleRelease --no-daemon
          else
            echo "No keystore found — building debug APK"
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          SIGNING_STORE_FILE:     ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "SpeedSound ${{ steps.tag.outputs.new_tag }}"
          body: ${{ steps.tag.outputs.changelog }}
          files: ${{ steps.apk.outputs.path }}
